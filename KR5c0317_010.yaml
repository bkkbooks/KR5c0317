body:
  text: 董奉董奉者字君異侯官縣人也昔吳先主時有年少作本縣長見君異年三十餘不知有道也罷去五十餘年復為他職行經侯官諸故吏人皆往見故長君異亦往顔色如昔了不異故長宿識之問曰君無有道也昔在縣時年紀如君輩今吾已皓白而君猶少也君異曰偶爾耳杜燮為交州刺史得毒病死已三日君異時在南方乃往以三丸藥內死人口中令人舉死人頭搖而消之食頃燮開目動手足顔色漸還半日中能起坐遂活後四日乃能語云死時奄然如夢見有數十烏衣人來收之將載露車上去入大赤門徑以寸獄獄各一户户才容一人以燮內一户中乃以土從外封之不復見外恍惚間聞有一人言太乙遣使者來召杜燮急開出之聞人以鍤掘其所居户良久引出之見外有車馬赤蓋三人共坐車上一人持節呼燮上車將還至門而覺燮既活乃為君異起高樓於中庭君異不飲食唯啖脯棗多少飲酒一日三為君異設之君異輒來就燮處飲食下樓時忽如飛鳥便來到座不覺其下上樓亦爾如此一年從燮求去燮涕泣留之不許燮問曰君欲何所之當具大船也君異曰不用船宜得一棺器耳燮即為具之至明日日中時君異死燮使人殯埋之七日人有從容昌來見君異因謝杜侯好自愛重燮乃開視君異棺中但見一帛一面畫作人形一面丹書符君異後還廬山下居有一人少便病癩埀死自載詣君異叩頭乞哀君異使此人坐一户中以五重布巾韜病者目使勿動搖乃敕家人莫近病人云聞有一物來舐之痛不可堪無處不匝度此物舌當一尺許其氣息大小如牛竟不知是何物良久乃去君異乃往解病人之巾以水與飲遣去不久當愈且勿當風十數日間病者身體通赤無皮甚痛得水浴即不復痛二十餘日即皮生瘡愈身如凝脂後常大旱百榖燋枯縣令丁士彥謂綱紀曰董君有道必能致雨乃自賫酒脯見君異説大旱之意君異曰雨易得耳因仰視其屋曰貧家屋皆見天不可以得雨如何縣令解其意因曰先生但為祈雨當為架好屋於是明日士彥自將吏人乃運竹為起屋屋成當泥塗作人掘土取壤欲取水作泥君異曰不煩運水日暮自當雨也其夜大雨高下皆足又君異居山間為人治病不取錢物使人重病愈者使栽杏五株輕者一株如此數年計得十萬餘株鬱然成林而山中百蟲羣獸遊戲杏下竟不生草有如耘治也於是杏子大熟君異於杏林下作簞倉語時人曰欲買杏者不須來報徑自取之得將榖一器置倉中即自往取一器杏云每有一榖少而取杏多者即有三四頭虎噬逐之此人怖懼而走杏即傾覆虎乃還去到家量杏一如榖少又有人空往偷杏虎逐之到其家乃嚙之至死家人知是偷杏遂送杏還叩頭謝過死者即活自是已後買杏者皆於林中自平量之不敢有欺者君異以其所得糧榖賑救貧窮供給行旅嵗消三千斛尚餘甚多縣令親故家有女為精邪所魅百不能治以語君異若能得女愈當以侍巾櫛君異即為君敕諸魅有大白鼉長丈六尺陸行詣病者問君異使人斬之女病即愈遂以女妻之久無兒息君異每出行妻不能獨住乃乞一女養之女年十嵗君異一旦竦身入雲中去婦及養女猶守其宅賣杏取給有欺之者虎逐之如故養女長大納壻同居其壻凶徒也常取諸祠廟之神衣物廟下神下巫語云某甲恃是仙人女壻奪吾衣物吾不在此但羞人耳當為仙人故無用為問君異在民間僅百年乃升天其顔色常如年三十時人也李根李根字子源許昌人也有趙賈者聞其父祖言傳世見根也賈為兒時便隨事根至賈年八十四而根年少不老昔在夀春吳太文家太文從之學道得作金銀法立成根能變化入水火中坐致行厨能供二十人皆精細之饌四方竒異之物非當地所有也忽告太文云王陵當敗夀春當陷兵中不復居可急徙去衆乃使人收根欲殺之根時乃方欲書疏奄聞外有千餘人圍其家求根語太文父曰匆匆但語吾不知官自來搜之昨已去矣太文出户還顧窺根失所在左右書器物皆不復見於是官兵入索囷食衣篋之中無處不遍不得根及良久太文出見根固在向坐儼然如故根語太文曰王太尉當族誅卿弟泄語十日中當卒死皆果如言弟子家有以女給根者此女知書根出行竊視根素書一卷讀之得根自説其學道經疏云以漢元封中學道於某甲時年計根已七百餘年也又太文説根兩目瞳子皆方按仙經説八百嵗人瞳子方也根告諸弟子言我不得神丹大道之訣唯得地仙方耳夀畢天地然不為下土之士也李意期李意期者蜀郡人也傳世識之云是漢文帝時人也無妻息人有欲逺行速至者意期以符與之并以丹書其人兩足則千里皆不盡日而還人有説四方郡國宫觀市井者座中或未見重問説者意期即為撮土作之所作郡國形象皆是但盈寸耳須叟消滅或遊行不知所之一年許復還於蜀中乞食所得以與貧乏者於成都角中作一土窟而居其中冬夏單衣髮長剪去之但使長五寸許啜少酒脯及棗果或食百日不出窟則無所食也劉玄德欲東伐吳報關羽之怨使人迎意期意期到玄德敬禮之問其伐吳意期不答而求紙筆玄德與之意期畫作兵馬器仗十數紙便一一以手裂壞之曰咄咄又畫一大人掘地埋之乃徑還去玄德不恱而出軍果大敗十餘萬衆才數百人得還器仗軍資一時蕩盡玄德忿恥發病而卒於永安宫乃追念其所作大人而埋之正是玄德之死象也意期少言語人有所問略不對答蜀人有憂患往問吉凶自有常候但占意期顔色若歡恱則百事吉慘戚則百事惡鄧艾未到蜀百餘日忽失意期所在後入琅琊山中不復出也王興王興者陽城人也常居一谷中本凡民不知書無學道意也昔漢武帝元封二年上嵩山登大愚石室起道宫使董奉君東方朔等齋潔思神至夜忽見仙人長二丈餘耳下垂至肩武帝禮而問之仙人曰吾九疑仙人也聞中嶽有石上菖蒲一寸九節服之可以長生故來採之言訖忽然不見武帝顧謂侍臣曰彼非欲學道服食者必是中嶽之神以此教朕耳乃採菖蒲服之且二年而武帝性好熱食服菖蒲每熱者輒煩悶不快乃止時從官多皆服之然莫能持久唯王興聞仙人使武帝常服菖蒲乃採服之不息遂得長生魏武帝時猶在其鄰里老小皆云傳世見之視興常如五十許人其強健日行三百里後不知所之黃敬黃敬字伯嚴武陵人也少讀誦經書仕州為部從事後棄世學道於霍山八十餘年復入中嶽専行服氣斷榖為吞吐之事胎息內視召六甲玉女吞隂陽符又思赤星在洞房前轉大如火周身至二百嵗轉還少壯道士王紫陽數往見從求要言敬告紫陽曰吾不修服藥之道但守自然蓋地仙耳何足詰問聞新野隂君神丹升天之法此真大道之極也子可從之人能除遣嗜欲如我者不可以學我所為也紫陽固請不止敬告紫陽曰大關之中有輔星想而見之翕習成赤童在焉持朱庭指而搖之鋉身形消遣三尸除死名審能守之可長生失之不久倫𡨕紫陽受之得長生之道也魯女生魯女生者長樂人也服胡麻餌术絶榖八十餘年甚少壯一日行三百餘里走逐麞鹿鄉里傳世見之二百餘年入華山中去時故人與女生别後五十年入華山廟逄女生乘白鹿從後有玉女數十人也甘始甘始者太原人也善行氣不飲食又服天門冬行房中之事依容成玄素之法更演益之為一卷用之甚有近效治病不用針灸湯藥在人間三百餘嵗乃入王屋山仙去也封君逹封君逹者隴西人也服黃精五十餘年又入鳥鼠山服鍊水銀百餘嵗往來鄉里視之年如三十許人常騎青牛聞人有疾病時死者便過與藥治之應手皆愈不以姓字語人世人識其乘青牛故號為青牛道士後二百餘年入玄丘山仙去也神仙傳卷十
