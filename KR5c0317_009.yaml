body:
  text: 壺公壺公者不知其姓名今世所有召軍符召鬼神治病王府符凡二十餘卷皆出於壺公故㧾名為壺公符汝南費長房為市掾時忽見公從逺方來入市賣藥人莫識之其賣藥口不二價治百病皆愈語賣藥者曰服此藥必吐出某物某日當愈皆如其言得錢日收數萬而隨施與市道貧乏飢凍者所留者甚少常懸一空壺於坐上日入之後公輒轉足跳入壺中人莫知所在唯長房於樓上見之知其非常人也長房乃日日自掃除公座前地及供饌物公受而不謝如此積久長房不懈亦不敢有所求公知長房篤信語長房曰至暮無人時更來長房如其言而往公語長房曰卿見我跳入壺中時卿便隨我跳自當得入長房承公言為試展足不覺已入既入之後不復見壺但見樓觀五色重門閣道見公左右侍者數十人公語長房曰我仙人也忝天曹職所統供事不勤以此見謫暫還人間耳卿可教故得見我長房不坐頓首自陳肉人無知積劫厚幸謬見哀愍猶如剖棺布氣生枯起朽但見臭頑弊不任驅使若見憐念百生之厚幸也公曰審爾大佳勿語人也公後詣長房於樓上曰我有少酒汝相共飲之酒在樓下長房遣人取之不能舉益至數十人莫能得上長房白公公乃自下以一指提上與長房共飲之酒器不過如蚌大飲之至旦不盡公告長房曰我某日當去卿能去否長房曰思去之心不可復言惟欲令親屬不覺不知當作何計公曰易耳乃取一青竹杖與長房戒之曰卿以竹歸家使稱病後日即以此竹杖置卧處默然便來長房如公所言而家人見此竹是長房死了哭泣殯之長房隨公去恍惚不知何所之公獨留之於羣虎中虎磨牙張口欲噬長房長房不懼明日又內長房石室中頭上有大石方數丈茅繩懸之諸蛇並往嚙繩欲斷而長房自若公往撰之曰子可教矣乃命噉溷溷臭惡非常中有蟲長寸許長房色難之公乃嘆謝遣之曰子不得仙也今以子為地上主者可夀數百餘嵗為傳封符一卷付之曰帶此可舉諸鬼神嘗稱使者可以治病消災長房憂不能到家公以竹杖與之曰但騎此到家耳長房辭去騎杖忽然如睡已到家家人謂之鬼具述前事乃發視棺中惟一竹杖乃信之長房以所騎竹杖投葛陂中視之乃青龍耳長房自謂去家一日推之已一年矣長房乃行符收鬼治病無不愈者每與人同坐共語而目訶遣人問其故曰怒鬼魅之犯法耳汝南郡中常有鬼怪嵗輒數來來時導從威儀如太守入府打鼓周行內外匝乃還去甚以為患後長房詣府君而正值此鬼來到府門前府君馳入獨留長房鬼知之不敢前欲去長房厲聲呼使捉前來鬼乃下車把版伏庭中叩頭乞得自改長房呵曰汝死老鬼不念溫涼無故導從唐突官府君知當死否急復令還就人形以一札符付之令送與葛陂君鬼叩頭流涕持札去使以追視之以札立陂邉以頸繞札而死東海君來旱長房後到東海見其民請雨謂之曰東海君有罪吾前繫於葛陂今當赦之令其作雨於是即有大雨長房曽與人共行見一書生黃巾被裘無鞍騎馬下而叩頭長房曰促還他馬赦汝罪人問之長房曰此貍耳盜社公馬也又嘗與客坐使至市市鮓頃刻而還或一日之間人見在千里之外者數處尹軌尹軌者字公度太原人也博學五經尤明天文理氣河洛䜟緯無不精微晚乃奉道常服黃精日三合年數百嵗而顔色美少常聞其逺祖尹喜以周康王昭王之時居草樓遇老君與說經其後周穆王再修樓觀以待有道之士公度遂居樓觀焉自云喜數來與相見授以道要由是能坐在立亡變化之事蘇并州家先祖頻奉事之纍世子孫見之顔狀常如五十嵗人遊行人間或入山一年半年復見無妻息其說天下盛衰治亂之期安危吉凶所在未嘗不效晉永康元年十二月道洛陽城西一家求寄宿主人以祭蠟不欲令宿良久公度語其姓名主人乃開門迎公度與前設酒食又以數斛榖與公度所乘青騾公度竟不飲啖騾亦不食榖明旦去謂主人曰君是不急難人耳先雖不欲受我宿後更有勤意吾及騾雖不食君所設意望相酬耳今賜君神藥一丸帶以隨身明年當有兵死者滿地此藥可以全君體命明年洛中果有趙王倫之亂死者數萬舉家有從軍者皆不還在家又為劫殺皆盡惟餘得藥一人耳公度腰中帶漆竹管數十枚中皆有藥入口即活天下大疫有得藥如棗者塗其門則一家不病病者立愈又弟子黃理居陸渾山中患虎為暴公度使斷大木為柱去家四方各一里外埋一柱公度即以印印之虎即絶跡又有怪鳥止其屋上以語公度公度為書一奏符著鳥鳴處至夕鳥伏死符下遂絶有人遭大喪當年而貧窮不及公度見而嗟之孝子說其孤苦公度愴然曰君能得數斤鉛否孝子曰可得耳乃具鉛數十斤公度將入山中小屋下罏火中銷鉛以神藥如棗大投沸鉛中攪之皆成銀以與之曰吾念汝貧困不能營葬故以相與慎勿言也復又有一人本士族子弟遇公事簿書不明當陪負官錢百萬出賣田宅車牛不售而見收繫公度語所識富人曰可暫以百萬錢借我欲以救之後二十日頓相還也富人即以錢百萬與公度公度以與遭事者乃語曰君致錫百兩其人即買錫與之公度於罏中洋錫以神藥一方寸匕投沸錫中變成黃金金即稱賣得錢百萬還錢主公度後到南陽太和山升仙去矣介象介象者字元則㑹稽人也學通五經博覽百家之言能屬文隂修道法入東嶽受氣禁之術能茅上燃火煮雞雞熟而茅不燋能令一里內不炊不蒸雞犬三日不鳴不吠能令一市人皆坐不能起能𨼆形變化為草木鳥獸聞九丹之經周遊數千里求之不值明師乃入山精思冀遇神仙疲極卧石上有一虎往䑛象象睡寤見虎乃謂之曰天使汝來侍衛我者汝且停若山神使汝來試我汝疾去虎乃去象入山見谷中有石子紫色光彩大如雞子不可稱數乃取兩枚而逰谷深不得度乃還於山中見一美女年十五六許顔色非常衣服五彩蓋仙人也象叩頭乞長生之方女曰汝急送手中物還故處乃來吾故於此待汝象即以石送於谷中而還見女子在舊處象復叩頭女曰汝血養之氣未盡斷榖三年更來吾止此象歸斷榖三年乃復往見此女故在前處乃以丹方一日授象告曰得此便仙勿他為也象未得合作此藥常住弟子駱延雅合惟下平牀中有書生數人共論書傳事云云不判象傍聞之不能忍乃為决解之書生知象非凡人密表奏象於其主象知之欲去曰恐官事拘束我耳延雅固留吳王詔徵象到武昌甚敬重之稱為介君為象起第宅以御帳給之賜遺前後纍千金從象學𨼆形之術試還後宫及出入殿門莫有見者又令象變化種瓜菜百果皆立生與先主共論鱠魚何者最上象曰鯔魚為上先主曰此魚乃在海中安可得乎象曰可得耳但令人於殿中庭方塪者水滿之象即索釣餌起釣之垂綸於塪中不食頃得鯔魚先主驚喜問象曰可食否象曰故為陛下取作鱠安不可食仍使厨人切之先主問曰蜀使不來得薑作鱠至美此間薑不及也何由得乎象曰易得耳願差一人并以錢五千文付之象書一符以著竹杖中令其人閉目騎杖杖止便買薑買薑畢復閉目此人如言騎杖須叟已到成都不知何處問人言是蜀中也乃買薑于時吳使張溫在蜀從人恰與買薑人相見於是甚驚作書寄家此人買薑還厨中鱠始就矣象又能讀諸符文如讀書無誤謬者或不信之取諸雜符除其標注以示象象皆一一别之又有一人種黍於山中嘗患獼猴食之聞象有道從乞辟猴法象告無他汝明日往看黍若見猴羣下大嗥語之曰吾已告介君介君教汝莫食黍此人倉卒直言象欺弄之明日往見羣猴欲下樹試告象言語猴即各還樹絶跡矣象在吳連求去先主不許象言某月日病先主使左右以梨一奩賜象象食之須臾便死先主殯埋之以日中死其日餔時已至建鄴以所賜梨付苑內種之吏後以表聞先主發視其棺中唯一奏版符耳先主思象使以所住屋為廟時時躬往祭之常有白鵠來集座上良久乃去後弟子見象在蓋竹山中顔色更少焉神仙傳卷九
