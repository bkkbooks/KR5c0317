body:
  text: 葛玄葛玄字孝先丹陽人也生而秀頴性識英明經傳子史無不該覽年十餘俱失怙恃忽歎曰天下有常不死之道何不學焉因遁迹名山參訪異人服餌芝术從仙人左慈受九丹金液仙經玄勤奉齋科感老君與太極真人降於天台山授玄靈寶等經三十六卷久之太上又與三真人項負圓光乘八景玉輿寶蓋幡幢旌節煥耀空中從官千萬命侍經仙郎王思真披九光玉韞出洞元大洞等經三十六卷及上清齋二法一絶羣獨宴靜氣遺形𡨕心之齋也二清壇肅侣依太真之儀先拔九祖次及家門後謝己身也靈寶齋六法一金籙調和隂陽寶鎮國祚二玉籙保祐后妃公侯貴族三黃籙卿相牧伯拔度九祖罪原四明真超度祖先解諸寃對五三元自謝犯戒之罪六八節謝七祖及己身請福謝罪也及洞神太一塗炭等齋并戒法等件悉遵太上之命修煉勤苦不怠尤長於治病收劾鬼魅之術能分形變化吳大帝要與相見欲加榮位玄不枉求去不得待以客禮一日語弟子張恭言吾為世主所逼留不遑作大藥今當以八月十三日中時去矣至期玄衣冠入室臥而氣絶顔色不變弟子燒香守之三日三夜夜半忽大風起發屋折木聲響如雷燭滅良久風止燃燭失玄所在但見委衣床上帶無解者明旦問鄰人鄰人言了無大風風止在一宅內籬落樹木並敗折也左慈左慈者字元放盧江人也少明五經兼通星緯見漢祚將盡天下亂起乃嘆曰值此衰運官高者危財多者死當世榮華不足貪也乃學道術尤明六甲能役使鬼神坐致行厨精思於天柱山中得石室內九丹金液經能變化萬端不可勝紀曹公聞而召之閉一室中使人守視斷其榖食日與二升水期年乃出之顔色如故曹公曰吾自謂天下無不食之人曹公乃欲從學道慈曰學道當得清淨無為非尊貴所宜曹公怒乃謀殺之慈已知之求乞骸骨曹公曰何忽去耳慈曰公欲殺慈慈故求去耳曹公曰無有此意君欲高尚其志者亦不久留也乃為設酒慈曰今當逺適願乞分杯飲酒公曰善是時天寒溫酒尚未熱慈解劒以攪酒須臾劒都盡如人磨墨狀初曹公聞慈求分杯飲酒謂慈當使公先飲以餘與慈耳而慈拔以畫杯酒酒即中斷分為兩向慈即飲其半送半與公公不喜之未即為飲慈乞自飲之飲畢以杯擲屋棟杯懸著棟動搖似飛鳥之俯仰若欲落而不落一座莫不矚目視杯既而已失慈矣尋問之慈已還所住處曹公遂益欲殺慈乃敕內外收捕慈慈走羣羊中追者視慈入羣羊中而奄忽失之疑其化為羊也然不能分别之捕吏乃語羊曰人主意欲得見先生暫還無苦於是羣羊中有一大者跪而言吏乃相謂曰此跪羊是慈也復欲擒之羊無大小悉長跪追者亦不知慈所在乃止後有知慈處者以告曹公公遣吏收之得慈慈非不得隱故欲令人知其神化耳於是受執入獄獄吏欲考訊之户中有一慈户外亦有一慈不知孰是曹公聞而愈惡之使引出市殺之須臾有七慈相似官收得六慈失一慈有頃六慈皆失尋又見慈走入市乃閉市四門而索之或不識者問慈形貌何似傳言慈眇一目青葛巾單衣見有似此人者便收之及爾一市中人皆眇一目葛巾單衣竟不能分曹公令所在普逐之如見便殺後有人見慈便斷其頭以獻曹公公大喜及至視之乃一束茅耳有從荆州來者見慈在荆州荆州牧劉表以為惑衆復欲殺慈慈意已知表出耀兵乃欲見其道術乃徐去詣表説有薄禮願以餉軍表曰道人單僑吾軍人衆非道人所能餉也慈重道之表使人取之有酒一器脯一束而十餘人共舁之不起慈乃自取之以一刀削脯投地請百人運酒及脯以賜兵士人各酒三杯脯一片食之如常酒脯味凡萬餘人皆周足而器中酒如故脯亦不減座中又有賔客數十人皆得大醉表乃大驚無復害慈之意慈數日委表東去入吳吳有徐隨者亦有道術居丹徒慈過隨門門下有客車六七乘客詐慈云徐公不在慈便即去宿客見其牛皆在楊栁樹杪行適上樹即不見下即復見牛行樹上又車轂中皆生荆棘長一尺斫之不斷搖之不動宿客大懼入報徐公説有一眇目老公至門吾欺之言公不在此人去後須臾使車牛皆如此不知何意徐公口咄咄此是左公過我汝曹那得欺之急追之諸客分布逐之及慈羅列叩頭謝之慈意解即遣還去及至見車牛如故繫在車轂中無復荆木也慈見吳先主孫權權素知慈有道頗禮重之權侍臣謝送知曹公劉表皆忌慈惑衆復譖於權欲使殺之後出逰請慈俱行令慈行於馬前欲自後刺殺之慈著木屐持青竹杖徐徐緩步行常在馬前百步著鞭䇿馬操兵器逐之終不能及送知其有道乃止慈告葛仙公言當入霍山中合九轉丹丹成遂仙去矣王遙王遙者字伯遼鄱陽人也有妻無子頗能治病病無不愈者亦不祭祀不用符水針藥其行治病但以八尺布帊敷坐於地不飲不食須臾病愈便起去其有邪魅作禍者遙畫地作獄因召呼之皆見其形物入在獄中或狐狸鼉蛇之類乃斬而燔燒之病者即愈遙有竹篋長數寸有一弟子姓錢隨遙數十年未嘗見遙開之常一夜大雨晦暝遙使錢以九節杖擔此篋將錢出冒雨而行遙及弟子衣皆不濕又常有兩炬火導前約行三十里許登小山入石室室中先有二人遙既至取弟子所擔篋發之中有五舌竹簧三枚遙自鼓一枚以二枚與室中二人並坐鼓之良久遙辭去三簧皆內篋中使錢擔之室中二人出送語遙曰卿當早來何為久在俗間遙答曰我如是當來也遙還家百日天復雨遙夜忽大治裝遙先有葛單衣及葛布巾已五十餘年未嘗著此夜皆取著之其妻即問曰欲捨我去乎遙曰暫行耳妻曰當將錢去否遙曰獨去耳妻即泣涕因自擔篋而去遂不復還後三十餘年弟子見遙在馬蹄山中顔色更少蓋地仙也陳永伯陳永伯者南陽人也得淮南王七里散方試按合服之二十一日忽然不知所在永伯有兄子名增族年十七亦服之其父繫其足閉於密户中晝夜使人守視之二十八日亦不復見不知所之本方云服之三十日得仙而陳氏二子服之未二十日而失所在後人不敢服仙去必有仙官來迎但人不見之耳太山老父太山老父者莫知其姓名漢武帝東巡狩見老父鋤於道間頭上白光高數尺怪而呼問之老父狀如年五十許人而面有童子之色肌體光華不與俗人同帝問有何道術耶老父答曰臣年八十五時衰老垂死頭白齒落有道士教臣絶榖服术飲水并作神枕枕中有三十二物其二十四物以象二十四氣其八物以應八風臣行之轉老為少黑髮更生齒墮復出日行三百里臣今年百八十矣武帝愛其方賜之金帛老父後入岱山中去十年五年時還鄉里三百餘年乃不復還也巫炎巫炎者字子都北海人也漢武帝出見子都於渭橋其頭上鬱鬱有紫氣高丈餘帝召而問之君年幾何所得何術而有異氣乎子都答曰臣年今已百三十八嵗亦無所得將行帝召東方朔使相此君有何道術朔對曰此君有隂術武帝屏左右而問之子都對曰臣昔年六十五時苦腰脊疼痛腳冷不能自溫口中乾苦舌燥涕出百節四肢各各疼痛又足痺不能久立得此道已來已七十三年有子三十六人身體強健無所病患氣力乃如壯時無所憂患帝曰卿不仁有道而不聞於朕非忠臣也子都頓首曰臣誠知此道為真然隂陽之事公中之私臣子之所難言也又行之皆逆人情能為之者少故不敢以聞帝曰勿謝君耳遂受其法子都年二百餘嵗服餌水銀白日升天武帝後頗行其法不能盡用之然得夀最勝於他帝逺矣河上公河上公者莫知其姓名也漢孝文帝時結草為庵于河之濵常讀老子道德經時文帝好老子之道詔命諸王公大臣州牧在朝卿士皆令誦之不通老子經者不得升朝帝於經中有疑義人莫能通侍郎裴楷奏云陜州河上有人誦老子即遣詔使賫所疑義問之公曰道尊德貴非可遙問也帝即駕幸詣之公在庵中不出帝使人謂之曰天之下莫非王土率土之濵莫非王民域中四大而王居其一子雖有道猶朕民也不能自屈何乃高乎朕能使民富貴貧賤須臾公即拊掌坐躍冉冉在空虛之中去地百餘尺而止於虛空良久俯而答曰余上不至天中不纍人下不居地何民之有焉君宜能令余富貴貧賤乎帝大驚悟知是神人方下輦稽首禮謝曰朕以不能忝承先業才小任大憂於不堪而志奉道德直以暗昧多所不了惟願道君垂愍有以教之河上公即授素書老子道德章句二卷謂帝曰熟研究之所疑自解余著此經以來千七百餘年凡傳三人連子四矣勿示非人帝即拜跪受經言畢失公所在遂於西山築臺望之不復見矣論者以為文帝雖耽尚大道而心未純信故示神變以悟帝意欲成其道時人因號河上公劉根劉根字君安長安人也少時明五經以漢孝成皇帝綏和二年舉孝亷除郎中後棄世道遁入嵩高山石室中崢嶸峻絶高五千丈自崖北而入冬夏無衣毛長一二尺其顔如十四五許人深目多鬚皆黃長三四寸每與坐或時忽然變著高冠玄衣人不覺換之時衡府君在潁川自説其先祖有與根同嵗者王莽數使使請根根不肯往衡府君道廟掾王珍問起居根不答再令功曹趙公往山逹敬根惟言謝府君更無他言後潁川太守高府君到官民人大疫郡中死者過半太守家大小悉病府君使珍從根求消災除疫氣之術珍叩頭述府君意根教於太嵗宫氣上穿地作孔深三尺以沙著中以酒沃之君依言病者即愈疫氣登絶後常用之有效後太守史祈以根為妖妄欲殺之遣使呼根舉郡皆諌以為不可祈殊不肯止諸吏先使人以此意報根使者至根曰太守欲吾來何也吾當往耳不往者恐汝諸人必得罪謂卿等不來呼我也根即詣郡時賔客盈坐祈令根前使庭下五十餘人將繩索鞭杖立于根後祈厲聲問曰君有道耶根曰有道祈曰有道能召鬼使我見乎若不見即當戮汝根曰甚易耳遂借祈前筆硯書作符扣階錚然作銅聲因長嘯嘯音非常清亮聞于城外聞者莫不肅然衆賔客悉恐須臾廳前南壁忽開數丈見四赤衣吏傳呼避道赤衣兵數十人操持刀劒將一科車直從壞壁中入到廳前根敕下車上鬼赤衣兵發車上烏被上有一老公一老姥反縳囚繫大繩的頭熟視之乃祈亡父母也祈驚愕愴然流涕父母亦泣責罵祈我生時汝仕宦未逹不得汝祿養我死後汝何為犯忤神仙尊官使我被收束囚辱如此汝亦何靣目立於人間祈下階叩頭向根乞放赦先人根乃敕赤衣兵將囚出去廳前南壁復開車過尋失車所在根亦隱去祈恍惚若狂其妻暴卒良久乃蘇云見君家先被捉者大怒云何以犯觸大仙使我被罪當來殺汝後月餘祈及妻兒並卒少室廟掾王珍數得見根顔色歡悅之情伏地叩頭請問根從初得道之由根説昔入山精思無處不到後入華隂山見一人乘白鹿從千餘人玉女左右四人執彩旄之節年皆十五六余再拜頓首求乞一言神人乃住告余曰汝聞昔有韓衆否乎答曰嘗聞有之神人曰即我是也余自陳少好長生不死之道而不遇明師頗習方書按而為之多不驗豈根命相不應度世也今日有幸逄大神是根宿夜夢想從心所願願見哀憐賜其要訣神未肯告余余乃流涕自摶重請神人曰坐吾將告汝汝有仙骨故得見我汝今髓不滿血不暖氣少腦減筋急肉沮故服藥行氣不得其力必欲長生且先治病十二年乃可服仙之上藥耳夫仙道有升天躡雲者有逰行五嶽者有食榖不死者有尸解而仙者要在於服藥服藥有上下故仙有數品也不知房中之事行氣導引而不得神藥亦不能仙也藥之上者唯有九轉還丹及太乙金液服之皆立便登天不積日月矣其次雲母雄黃之屬能使人乘雲駕龍亦可使役鬼神變化長生者草木之藥唯能治病補虛駐年返白斷榖益氣不能使人不死也高可數百年下才全其所稟而已不足久賴矣余乃頓首曰今日受教乃天也神人曰必欲長生先去三尸三尸去則意志定嗜欲除也乃以神方五篇見授云伏尸常以月望晦朔上天白人罪過司命奪人算紀使少壽人身中神欲人生而三尸欲人死死則神散返於無形之中而三尸成鬼而人享奠祭祀之則得歆饗以此利在人速死也夢與惡人鬬爭此乃神與尸相戰也根乃從次合作服之遂以得仙珍又言數見投符於地有所告召即見如取之者然不見人又佳聞有所推問有人答對而不見形也或聞有鞭杖聲而或地上見血莫測其端也教珍守一行氣存神先生三綱六紀謝過上古之法不知珍能得仙名耳根後入雞頭山中仙去矣神仙傳卷八
