body:
  text: 東郭延東郭延字公遊山陽人也少好道聞李少君有道求與相見叩頭乞得執侍巾櫛灑掃之役少君許之見延小心良謹可成臨當去密以五帝六甲左右靈飛之術遊虛招真十二事授延告之曰此亦要道也審而行之亦升天矣口訣畢而遣去延遂還家合服靈飛散能夜書在寢室中身生光點左右行六甲左右術能占吉凶天下當死者識與不識皆逆知之又役使鬼神收攝虎豹無所不為在鄉里四百嵗不老漢建安二十一年一旦有數十人乘虎豹之來迎之鄰盡見之乃與親故别而辭去云詣崑崙臺臨去先以神丹方五帝靈飛祕要傳尹先生靈夀光靈夀光者扶風人也年七十時得朱英丸方合服之轉更少壯如年二十時至建安元年已二百二十嵗矣劉京劉京字太玄南陽人也漢孝文皇帝侍郎也後棄世從邯鄲張君學道受餌朱英丸方合服之百三十嵗視之如三十許人後師事薊子訓子訓授京五帝靈飛六甲十二事神仙十洲真形諸祕要京按訣行之甚效能役使鬼神立起風雨召致行厨坐在立亡而知吉凶期日又能為人祭天益命或得十年到期皆死其不信者至期亦死周流名山五嶽與王真俱行悉遍也魏武帝時故遊行諸弟子家皇甫隆聞其有道乃隨事之以雲母九子丸及交接之道二方教隆隆按合行服之色理日少髮不白齒不落年三百餘嵗不知能得度世不耳魏黃初三年京入衡山中去遂不復見京語皇甫隆曰治身之要當朝朝服玉泉使人丁壯有顔色去三蟲而堅齒也玉泉者口中液也朝來起早漱液滿口乃吞之琢齒二七過如此者三乃止名曰錬精使人長生也夫交接之道至難非上士不能行之乘奔牛驚馬未足喻其嶮墜矣卿性多淫得無當用此自戒乎如京言慮隆不得度世也嚴青嚴青者會稽人也家貧常在山中燒炭忽遇仙人云汝骨相合仙乃以一卷素書與之令以淨器盛之置高處兼教青服石腦法青遂以淨器盛書置高處便聞左右常有十數人侍之每載炭出此神便為引船他人但見船自行後斷榖入小霍山去帛和帛和字仲理師董先生行氣斷榖术又詣西城山師王君君謂曰大道之訣非可卒得吾暫往瀛洲汝於此石室中可熟視石壁久久當見文字見則讀之得道矣和乃視之一年了無所見二年似有文字三年了然見太清中經神丹方三皇文五嶽圖和誦之上口王君回曰子得之矣乃作神丹服半劑延年無極以半劑作黃金五十斤救惠貧病也趙瞿趙瞿者上黨人也病癩厯年衆治之不愈垂死或云不及活流棄之後子孫轉相注易其家乃賫糧將之送置山穴中瞿在穴中自怨不幸晝夜悲歎涕泣經月有仙人行經過穴見而哀之具問訊之瞿知其異人乃叩頭自陳乞哀於是仙人以一囊藥賜之教其服法瞿服之百許日瘡都愈顔色豐恱肌膚玉澤仙人又過視之瞿謝受更生活之恩乞丐其方仙人告此是松脂耳此山中更多此物汝錬服之可以長生不死瞿乃歸家家人初謂之鬼也甚驚愕瞿遂長服松脂身體轉輕氣力百倍登危越險終日不極年百七十嵗齒不墮髮不白夜卧忽見臺間有光大如鏡者以問左右皆云不見久而漸大一室盡明如晝日又夜見面上有綵女二人長二三寸面體皆具但為小耳遊戲其口鼻之間如是且一年此女漸長大出在其側又常聞琴瑟之音欣然獨笑在人間三百許年色如小童乃入抱犢山去必地仙也宫嵩宫嵩宫嵩者大有文才著道書二百餘卷服雲母得地仙之道後入苧嶼山中仙去容成公容成公行玄素之道延壽無極董仲君董仲君者臨淮人也服氣錬形二百餘嵗不老曽被誣繫獄乃佯死須臾蟲出獄吏乃舁出之忽失所在倩平吉倩平吉者沛人也漢初入山得道至光武時不老後託形尸假百餘年却還鄉里也王仲都王仲都者漢中人也漢元帝常以盛暑時暴之繞以十餘爐火而不熱亦無汗凝冬之月令仲都單衣無寒色身上氣蒸如炊後不知所在程偉妻漢黃門郎程偉好黃白術娶妻得知方家女偉常從駕出而無時衣甚憂妻曰請致兩假縑縑即無故而至前偉按枕中鴻寶作金不成妻乃往視偉偉方扇炭燒筒筒中有水銀妻曰吾欲試相視一事乃出其囊中藥少許投之食頃發之已成銀偉大驚曰道在汝處而不早告我何也妻曰得之須由命者於是偉日夜説誘之賣田宅以供美食衣服猶不肯告偉偉乃與伴謀撾笞杖之妻輒知之告偉言道必當傳其人得其人得路相遇輒教之如非其人口是而心非雖寸斷而支解而道猶不出也偉逼之不止妻乃發狂裸而走以泥自塗遂卒薊子訓薊子訓薊逹字子訓齊國臨淄人李少君之邑人也少仕州郡舉孝亷除郎中又從軍拜駙馬都尉晚悟治世俗綜理官無益於年命也乃從少君學治病作醫法漸久見少君有不死之道遂以弟子之禮事少君而師焉少君亦以子訓用心専知可成就漸漸告之以道家事因教令胎息胎食住年止白之法行之二百餘年顔色不老在鄉里與人信讓從事性好清淨常間居讀易時作小小文疏皆有意義少君晚又授子訓無常子大幻化之術按事施行皆效曽見比舍家抱一兒從求抱之失手而墮地即死其家素尊敬之不敢有悲哀之色而埋之謂此兒命應不成人行已積日轉不能復思之子訓因還外抱兒還家家人恐是鬼乞不復用子訓曰但取無苦故是汝兒也兒識其母喜笑欲往母乃取之意猶不了子訓既去夫婦共往掘視所埋死兒窆器中有泥兒長六寸許耳此兒遂長大又諸老人髮必白者子訓但與之對坐共語宿昔之間則明旦皆髮黑矣亦無所施為為黑可期一年二百日也亦復有不使人髮黑者蓋神幻之大變者也京師貴人聞之莫不虛心欲見子訓而無緣致之子訓比居有年少為太學生於是諸貴人共呼語之卿所以勤苦讀書者欲以課試規富貴耳但為吾一致薊子訓來能使卿不勞而逹書生許諾乃歸親事子訓朝夕灑掃立侍左右如此且二百日子訓語書生曰卿非學道者何能如此書生曰忝鄉里末流長幼之道自當爾子訓曰何以不道實而作虛飾邪吾以具知卿意諸貴人欲得見我我亦何惜一行之勞而不使卿得榮位乎便可還語諸人吾某月某日當往書生甚喜到京師具向諸貴人説此意到期日子訓未行書生父母憂之往視子訓子訓曰恐我不行也不使卿兒失信當發以食時去所居書生父母相謂曰薊先生雖不如期至要是往也定後日書生歸推計之子訓以其日中時到京師是不能半日行千餘里既至書生往見之子訓子訓問書生曰誰欲見我者書生曰欲見先生者甚多不敢枉屈但乞知先生所止自當來也子訓曰不須使來吾尚千餘里來寧復與諸人計此邪卿今日使人人盡語之使各絶賔客吾日中當往臨時自當擇所先詣書生如其言語貴人貴人各灑掃到日中子訓往凡二十三處便有二十三子訓各在一處諸貴人各各喜自謂子訓先詣之定明日相參問同時各有一子訓其衣服顔色皆如一而論説隨主人咨問各各答對不同耳主人並為設酒食之具以餉子訓皆各家家盡禮飲食之於是逺近大驚諸貴人並欲詣之子訓謂書生曰諸人謂我當有重瞳八采故欲見我我亦無所道我不復往便爾去矣適出門諸貴人冠蓋塞道到門書生言適去東陌上乘青騾者是也於是各各走馬逐之望見其騾徐徐而行各走馬逐之不及如此行半日而常相去一里許不可及也乃各罷還子訓既少君鄉里弟子微密謹慎思證道奧隨時明匠將足甄綜衆妙矣神仙傳卷七
