body:
  text: 墨子墨子者名翟宋人也仕宋為大夫外治經典内修道術著書十篇號為墨子世多學之者與儒家分塗務尚儉約頗毁孔子尤善戰守之功公輸班為楚將作雲梯之械將以攻宋墨子聞之徒行詣楚足乃壊裂裳以褁之七日七夜到楚見公輸班説之曰子為雲梯將以攻宋宋何罪之有耶楚餘於地而不足於民殺所不足而爭所有餘不可謂智宋無罪而攻之不可謂仁知而不爭不可謂忠爭而不得不可謂强公輸班曰吾不可以言於王矣墨子曰子令見我於王公輸班曰諾墨子見王曰今有人其文軒隣有弊轝而欲之其錦繡隣有短褐而欲之其粱肉隣有糟糠而欲之此謂何若人也楚王曰若然者必有狂疾翟曰楚有雲夢麋鹿滿之江漢魚鼈為天下富宋無雉兔井鮒此猶粱肉之與糟糠也楚有柟梓松橡宋無數尺之木此猶有錦繡之與短褐也臣聞大王吏議攻宋與此同也王曰善哉然公輸班已為雲梯謂必取宋於是見公輸班攻宋墨子解帶為城以幞為械公輸班乃設攻城之機九變而墨子九拒之公輸班之攻城械盡而墨子之守有餘公輸班屈曰吾知所以攻子矣吾不言墨子曰吾知子所以攻我吾不言矣楚王問其故墨子曰公輸班之意不過欲殺臣謂宋莫能守耳然臣之弟子禽滑等三百人早已操臣守禦之器在宋城之上而待楚冦至矣雖殺臣不能絶也楚乃止不復攻宋焉墨子年八十有二乃歎曰世事已可知矣榮位非可長保將委流俗以從赤松逰矣乃謝遣門人入山精思至道想像神仙於是夜常聞左右山間有誦書聲者墨子卧後又有人來以衣覆之墨子乃伺之忽有一人乃起問之曰君豈山嶽之靈氣乎將度世之神仙乎願且少留誨以道教神人曰子有至徳好道故來相候子欲何求墨子曰願得長生與天地同畢耳於是神人授以素書朱英丸方道靈教戒五行變化凡二十五卷吿墨子曰子既有仙分縁又聰明得此便成不必須師也墨子拜受合作遂得其效乃撰集其要以為五行記五卷乃得地仙𨼆居以避戰國至漢武帝時遂遣使者楊遼束帛加璧以聘墨子墨子不出視其顔色常如五六十歲人周逰五嶽不止一處也劉政劉政者沛國人也髙才博物學無不覽深維居世榮貴須臾不如學道可得長生乃絶進取之路求養性之術勤尋異聞不逺千里茍有勝己雖奴客必師事之後治墨子五行記兼服朱英丸年百八十餘歲也如童子好為變化𨼆形又能以一人作百人百人作千人千人作萬人又能𨼆三軍之衆使人化成一叢林木亦能使成鳥獸試取他人器物以置其衆處人不覺之又能種五菓之木便華實可食生致行厨供數百人又能吹氣為風飛沙揚石以手指屋宇山林壺器便欲傾壞更指之則還如故又能化作美女之形及作木人能一日之中行數千里噓水興雲奮手起霧聚壤成山刺地成淵能忽老忽少乍大乍小入水不濕步行水上召江海中魚鼈蛟龍黿鼉即皆登岸又口吐五色之氣方廣十里氣上連天又能騰躍上下去地數百丈後不知所在孫博孫博者河東人也有清才能屬文著書百許篇誦經數十萬言晚乃學道治墨子之術能使草木金石皆為火光照耀數十里亦能使身中成炎口中吐火指大𣗳生草即焦枯若更指之則復如故亦能使三軍之衆各成一樷火又有藏人亡奴在軍中者自捕之不得因就博請博語奴主曰吾為卿焼其營奴必走出卿但諦伺捉取之於是博以一赤丸擲於軍中須臾火起漲天奴果走出而得之博乃更以一青丸擲之火中火勢即滅屋百物向已焦燃者皆悉如故不損博每作火有所燒他人雖以水灌之終不可滅須博自止之乃止耳行火水中不但己身不沾乃能兼使從者數百人皆不沾又能將人於水上敷席而坐飲食作樂使衆人舞於其上不沒不濡終日盡歡其疾病者就博自治亦無所云為博直指之言愈即愈又山間石壁及地上盤石博便入其中初尚見背及兩耳出石間良久都沒又能呑刀劍數十枚及從壁中出入如有孔穴也又能引鏡為刀屈刀為鏡可積時不改須博指之刀復如故後入林慮山中合神丹而仙矣班孟班孟者不知何許人或云女子也能飛行終日又能坐空虚之中與人言語又能入地中初時沒足至腰及胷漸漸但餘冠幘良久而盡沒不見又以指刻地即成泉井而可汲引又吸人屋上瓦瓦即飛入人家人家有桑菓數十株皆聚之成積如山如此十餘日吹之各還其本處如常又能含墨舒紙著前嚼墨一噴之皆成文字滿紙各有意義後服酒餌丹年四百餘嵗更少容後入大治山中仙去也玉子玉子者姓張震南郡人也少學衆經周幽王徵之不起乃歎曰人居世間日失一日去生轉逺去死轉近而貪富貴不知養性命盡氣絶即死位為王侯金玉如山何益於是為灰土乎獨有神仙度世可以無窮耳乃師長桑子受其衆術乃造一家之法著道書百餘篇其術以務魁為主而精於五行之意演其微妙以養性治病消灾散禍能起飄風發木折屋作雲雷雨霧以草芥瓦石為六畜龍虎立便能行分形為數百千人又能涉行江漢含水噴之立成珠玉遂不復變也或時閉氣不息舉之不起推之不動屈之不曲伸之不直如此數十日乃復起如故每與諸弟子行各丸泥為馬與之皆令閉目須臾皆乗大馬乗之一日千里又能吐五色氣起數丈見飛鳥過指之墮地又臨淵投符召魚鼈魚鼈皆走上岸又能使諸弟子舉眼即見千里外物亦不能久也其務魁時以器盛水著兩魁之間吹而噓之水上立有赤光繞之曄曄而起又以此水治百病在内者飲之在外者浴之皆使立愈後入崆峒山合丹丹成白日昇天也天門子天門子天門子者姓王名綱尤明補養之要故其經曰陽生立於寅純木之精隂生立於申純金之精夫以木投金無徃不傷故隂能溲陽也隂人著脂粉者法金之白也是以真人道士莫不留心駐意精其微妙審其盛衰我行青龍彼行白虎彼前朱雀我後𤣥武不死之道也又隂人之情也有急於陽然能外自戕抑不肯請陽者明金不為木屈也陽性氣剛躁志節踈略至於逰晏則聲氣和柔言辭卑下明木之畏金也天門子既行此道年二百八十嵗色如童子乃服珠醴得仙入𤣥洲去也九靈子九靈子者姓皇名化得還年却老胎息内視之要五行之道其經曰此術可以辟五兵却虎狼安全己身營護家門保子冝孫内外和睦人見則喜不見則思既宜從軍又利逺客他人謀已消滅不成千殃萬禍伏而不起杜姦邪之路塞妖怪之門呪咀之者其災不成厭蠱之者其禍不行天下之賢皆來宗己傾神靈之心得百姓之意田大行六畜繁孶奴婢安家疾病得愈縣官逆解忿爭得勝百事皆利世有專世行此道者大得其妙在人間五百餘年顔容益少後服鍊丹而乃登仙去矣北極子北極子北極子者姓隂名恒其經曰治身之道愛神為寳養性之術死入生出常能行之與天相畢因生求生真生矣以鐡治鐵之謂真以人治人之謂神後服神丹而仙焉絶洞子絶洞子絶洞子者姓李名修其經曰弱能制强隂能弊陽常若臨深履危御奔乗駕長生之道也年四百餘歲顔色不衰著書四十篇名曰道源服丹昇天也太陽子太陽子者姓離名明本玉子同年之親友也玉子學道已成太陽子乃事玉子盡弟子之禮不敢懈怠然玉子特親愛之有門人三十餘人莫與其比也而好酒恒醉頗以此見責然善為五行之道雖鬢髮班白而肌膚豐盛面目光華三百餘嵗猶自不改玉子謂之曰汝當理身養性而為衆賢法司而低迷大醉功業不修大藥不合雖得千嵗猶未足以免死况數百嵗者乎此凡庸所不為况於達者乎對曰晚學性剛俗態未除故以酒自驅其驕慢如此著七寳𣗳之術深得道要服丹得仙時時在世間五百嵗中面如少童多酒其鬢鬚皓白也太陽女太陽女者姓朱名翼敷演五行之道加思増益致為微妙行用其道甚驗甚速年二百八十嵗色如桃花口如含丹肌膚充澤眉鬢如畫有如十七八者也奉事絶洞子丹成以賜之亦得仙昇天也太隂女太隂女者姓盧名全為人聰達知慧過人好玉子之道頗得其法未能精妙時無明師乃當道沽酒宻欲求賢積年累久未得勝己者㑹太陽子過之飲酒見女禮節恭修言詞間雅太陽子喟然歎曰彼行白虎螣蛇我行青龍𤣥武天下悠悠知者為誰女聞之大喜使妹問客土數為幾對曰不知也但南三北五東七西七中一耳妹還報曰客大賢者至徳道人也我始問一已知五矣遂請入道室改進妙饌盛設嘉珍而享之以自陳訖太陽子曰共事天帝之朝俱飲神光之水身登玉子之魁體有五行之寳唯賢是親豈有所怪遂授補道之要授以蒸丹之方合服得仙仙時年已二百嵗而有少童之色也太𤣥女太𤣥女者姓顓名和少喪夫主有術人相其母子曰皆不夀也乃行學道治玉子之術遂能入水不濡盛寒之時單衣行水上而顔色不變身體溫暖可至積日能徙官府宫殿城市及世人屋於他處視之無異指之則失其所在又門户櫝櫃有關籥者指之即開指山山崩指𣗳𣗳死更指之皆復如故將弟子行所到山間日暮以杖扣山石石皆有門户開入其中有屋室床几帷帳厨廩酒食如常雖行萬里所在常耳能令小物忽大如屋大物忽小於毫芒野火漲天噓之即滅又能生炎火之中衣裳不燃須臾之間化為老翁小兒車馬無所不為行三十六術甚有神效起死無數不知其何所服食顔色益少鬢髮如鴉忽白日昇天而去南極子南極子者姓柳名融能合粉成雞子吐之數十枚煑之而啖出雞子中黄皆餘有少許粉如指端者取粉塗杯呪之即成龜煑之可食腹藏皆具而粉杯成龜殻者取肉則殻還成粉杯矣又取水呪之即成美酒飲之醉人又能舉手即成大𣗳人或折其細枝以刺屋間連日猶在以漸萎黄與真木無異也服雲霜丹而得仙去矣黄盧子黄盧子者姓葛名起甚能理病若千里只寄姓名與治之皆得痊愈不必見病人身也善氣禁之道禁虎狼百蟲皆不得動飛鳥不得去水為逆流一里年二百八十嵗力舉千鈞行及奔馬頭上常有五色氣髙丈餘天大旱時能至淵中召龍出催促便昇天即便降雨數數如此一旦乗龍而去與諸親故辭别遂不復還矣神仙傳卷四
