body:
  text: 皇初平皇初平者丹谿人也年十五而家使牧羊有道士見其良謹使將至金華山石室中四十餘年忽然不復念家其兄初起入山索初平歴年不能得見後在市中有道士善卜乃問之曰吾有弟名初平因令牧羊失之今四十餘年不知死生所在願道君為占之道士曰金華山中有一牧羊兒姓皇名初平是卿弟非耶初起聞之驚喜即隨道士去尋求果得相見兄弟悲喜因問弟曰羊皆何在初平曰羊近在山東初起徃視了不見羊但見白石無數還謂初平曰山東無羊也初平曰羊在耳但兄自不見之初平便乃俱徃㸔之乃叱曰羊起於是白石皆變為羊數萬頭初起曰弟獨得神通如此吾可學否初平曰唯好道便得耳初起便棄妻子留就初平共服松脂茯苓至五千日能坐在立亡行於日中無影而有童子之色後乃俱還鄉里諸親死亡略盡乃復還去臨去以方授南伯逢易姓為赤初平改字為赤松子初起改字為魯班其後傳服此藥而得仙者數十人焉呂恭吕恭字文敬少好服食將一奴一婢於太行山中採藥忽有三人在谷中因問恭曰子好長生乎而乃勤苦艱險如是耶恭曰實好長生而不遇良方故採服此物冀有微益也一人曰我姓吕字文起一人曰我姓孫字文陽一人曰我姓李字文上皆太清太和府仙人也時來採藥當以成授新學者公既與吾同姓又字得吾半是公命當應長生也若能隨我採藥語公不死之方恭即拜曰有幸得遇神人但恐闇塞多罪不足教授若見採救是更生之願也即隨仙人去二日乃授恭秘方一通因遣恭還曰可歸省鄉里恭即拜辭仙人語恭曰公來雖二日今人間已二百年恭歸到家但見空野無復子孫乃見鄉里數世後人趙光輔遂問吕恭家何在人轉怪之曰君自何來乃問此久逺之人吾聞先世傳有吕恭將一奴一婢入山採藥不復歸還以為虎狼所傷耳經今已二百餘年君何問乎吕恭有後世孫吕習者在城東北十里作道士人多奉事之推求易得耳恭承輔言徃到習家叩門而呼之奴出問曰公何來恭曰此是吾家也我昔採藥隨仙人去至今二百餘年今復歸矣習舉家驚喜徒跣而出拜曰仙人來歸流涕不能自勝居久之乃以神方授習而去時習已年八十服之轉轉還少至二百嵗乃入山去其子孫世世服此藥無復老死皆得仙也沈建沈建者丹陽人也世為長史而建獨好道不肯仕宦學導引服食之術逺年却老之法又能治病病無輕重遇建則差舉事之者千餘家一日建當逺行留寄一奴一婢并驢一頭羊十口各與藥一丸語主人曰但累居不煩主人飲食也便决去主人怪之曰此君所寄口有十三不留寸資當若之何建去之後主人飲啖奴婢奴婢聞食皆吐逆以草與驢羊驢羊皆避而不食便欲觝人主人乃驚後百餘日奴婢面體光澤轉勝於初時驢羊悉肥如飼建去三年乃還又各以一丸藥與奴婢驢羊乃却飲食如故建遂斷穀不食能輕舉飛行徃還如此三百餘年乃絶迹不知所之也華子期華子期者淮南人也師祿里先生受𨼆仙靈寳方一曰伊洛飛龜秩二曰伯禹正機三曰平衡方按合服之日以還少一日能行五百里力舉千斤一嵗十二易其形後乃仙去樂子長樂子長者齊人也少好道因到霍林山遇仙人授以服巨勝赤松散方仙人告之曰蛇服此藥化為龍人服此藥老成童又能昇雲上下改人形容崇氣益精起死養生子能行之可以度世子長服之年一百八十嵗色如少女妻子九人皆服其藥老者返少小者不老乃入海登勞盛山而仙去也衞叔卿衞叔卿者中山人也服雲母得仙漢元鳯二年八月壬辰武帝閒居殿上忽有一人乗浮雲駕白鹿集於殿前帝驚問之為誰曰我中山衞叔卿也帝曰中山非我臣乎叔卿不應即失所在帝甚悔恨即使使者梁伯之徃中山推求遂得叔卿子名度世即將還見帝問焉度世答曰臣父少好仙道服藥治身八十餘年體轉少壯一旦委臣去言當入華山耳今四十餘年未嘗還也帝即遣梁伯之與度世徃華山覔之度世與梁伯之俱上山輒雨積數日度世乃曰吾父豈不欲吾與人俱徃乎更齋戒獨上望見其父與數人於石上嬉戲度世既到見父上有紫雲覆廕鬱鬱白玉為床有數仙童執幢節立其後度世望而再拜叔卿問曰汝來何為度世具説天子悔恨不得與父共語故遣使者與度世共來叔卿曰吾前為太上所遣欲戒帝以灾厄之期及救危厄之法國祚可延而帝强梁自貴不識道真反欲臣我不足吿語是以棄去今當與中黄太一共定天元九五之紀吾不得復徃也度世因曰向與父博者為誰叔卿曰洪崖先生許由巢父王子晉薛容也今世向大亂天下無聊後數百年間土滅金亡天君來出乃在壬辰耳我有仙方在家西北柱下歸取按之合藥服餌令人長生不死能乗雲而行道成來就吾於此不須復為漢臣也度世拜辭而歸掘得玉函封以飛仙之香取而按之餌服乃五色雲母并以教梁伯之遂俱仙去不以吿武帝也魏伯陽魏伯陽者呉人也本髙門之子而性好道術不肯仕宦閒居養性時人莫知之後與弟子三人入山作神丹丹成知弟子心不盡乃試之曰此丹今雖成當先試之今試飴犬犬即飛者可服之若犬死者則不可服也伯陽入山特將一白犬自隨又有毒丹轉數未足合和未至服之暫死故伯陽便以毒丹與白犬食之即死伯陽乃問弟子曰作丹惟恐不成丹既成而犬食之即死恐未合神明之意服之恐復如犬為之奈何弟子曰先生當服之否伯陽曰吾背違世俗委家入山不得仙道亦不復歸死之與生吾當服之耳伯陽乃服丹丹入口即死弟子顧相謂曰作丹欲長生而服之即死當奈何獨有一弟子曰吾師非凡人也服丹而死將無有意耶亦乃服丹即復死餘二弟子乃相謂曰所以作丹者欲求長生今服即死焉用此為若不服此自可數十年在世間活也遂不服乃共出山欲為伯陽及死弟子求市棺木二人去後伯陽即起將所服丹内死弟子及白犬口中皆起弟子姓虞遂皆仙去因逢人入山伐木乃作書與鄉里寄謝二弟子弟子方乃懊恨伯陽作參同契五行相𩔖凡三卷其説似解周易其實假借爻象以論作丹之意而儒者不知神仙之事反作隂陽注之殊失其大㫖也神仙傳卷二
