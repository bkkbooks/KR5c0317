body:
  text: 淮南王淮南王安好神仙之道海内方士從其游者多矣一旦有八公詣之容狀衰老枯槁傴僂閽者謂之曰王之所好神仙度世長生乆視之道必須有異於人王乃禮接今公衰老如此非王所宜見也拒之數四公求見不已閽者對如初八公曰王以我衰老不欲相見却致年少又何難哉於是振衣整容立成童幼之狀閽者驚而引進王倒屣而迎之設禮稱弟子曰高仙逺降何以教寡人問其姓氏答曰我等之名所謂文五常武七徳枝百英壽千齡葉萬椿鳴九臯修三田岑一峯也各能吹嘘風雨震動雷電傾天駭地廽日駐流役使鬼神鞭撻魔魅出入水火移易山川變化之事無所不能也時王之小臣伍被曽有過恐王誅之心不自安詣闕告變證安必反武帝疑之詔大宗正持節淮南以案其事宗正未至八公謂王曰伍被人臣而誣其主天必誅之王可去矣此亦天遣王耳君無此事日復一日人間豈可捨哉乃取鼎煮藥使王服之骨肉近三百餘人同日昇天雞犬䑛藥器者亦同飛去八公與王駐馬於山石上但留人馬蹤跡不知所在宗正以此事奏帝帝大懊恨命誅伍被自此廣招方士亦求度世之藥竟不得其後王母降時授仙經宻賜靈方得尸解之道由是茂陵玉箱金杖丹出人間抱犢道經見於山洞亦視示武帝不死之跡耳李少君李少君字雲翼齊國臨淄人也少好道入泰山採藥修絶榖遁世全身之術道未成而疾困於山林中遇安期先生經過見少君少君叩頭求乞活安期愍其有至心而被病當死乃以神樓散一匕與服之即起少君於是求隨安期奉給奴役使任師事之安期將少君東至赤城南至羅浮北至大垣西游玉門周流五嶽觀㸔江山如此數十年安期一旦語之我𤣥洲召即日當去汝未應隨我至彼今當相捨去也復六百年當迎汝於此因授神丹鑪火飛雪之方誓約口訣畢須臾有乗龍虎導引數百人迎安期安期乗羽車而昇天也少君於是還齋戒賣於市商估六國或時為吏或作師醫治病或時煦賃易姓改名遊行處所莫知其有道逮漢武帝之時聞帝招募方士特敬道術而先貧不辦合大藥喟然長歎語弟子曰老將至矣死將近矣而財不足用躬耕力作商估求錢必不致辦合藥又吾亦羸拙於斯事也聞天子好道請欲見之求為合丹可得恣意無求不得天子中成者成之不中教者便捨去吾在世上已五百餘年而不為一權者必不免於蟲蟻之粮矣乃以方上武帝言臣能凝汞成白銀飛丹砂成黄金金成服之白日昇天神仙無窮身生朱陽之羽體備圓光之翼竦則凌天伏入無間控飛龍而八遐已遍駕白鴻而九陔立周𡨕海之棗大如𤓰鍾山之李大如瓶臣已食之逮先師安期先生授臣口訣是以保黄物之可成也於是引見甚尊敬之賜遺無數為立屋地武帝自謂必能使我度世者少君嘗從武安侯飲酒坐中有老人年九十餘少君言與其祖父逰射處老人為小兒時從其祖父識有此人一座盡驚少君見武帝有故銅器少君望而識之曰昔齊桓公嘗陳此器於栢寢帝按其刻果齊桓公器乃知少君數百嵗人也然視之常時年五十許人面色甚好肌膚恱澤尤有光華眉目口齒似十五童子諸侯王䝿人聞能令其人不死老更少壯饋遺之金錢無限乃宻作神丹丹成未服又就帝求五帝六甲左右霛飛之書凡十二事帝以元封四年七月以書授少君到元封六年九月少君稱疾上表云陛下思心𤣥妙志甄長生於是招訪道術無逺不至精誠感神天神斯降自非宿命所適孰能偕合然丹方禁重宜絶臭腥㳒養物仁克仙蠢動而陛下不能絶奢侈逺聲色殺伐不止喜怒不除萬里有不歸之䰟市朝有流血之刑神丹大道未可得成而臣疾與年偕今者虚瘵又不獲躬親齋戒預覩彭祖丹砂之變於此邈矣先師安期先生昔所賜金丹之方信而有徵若按節度奉法戒爾乃可備用之焉若鬱砂虹飛𤣥朱九轉剖六二而流精奪日探霜雪而月光風卷徘徊丹霞騰沸龍虎投鉛錫而黄金克成刀圭入喉而凋氣立反爾乃駕神虬以上昇騁雲車以涉逺當騐此方之神將明小臣之不妄矣乃以小丹方與帝而稱疾固非大丹方也其夜武帝夢與少君俱上嵩高上半道有繡衣使者乗龍持節從雲中下言太一請少君武帝覺即遣使者問少君消息且告近臣曰如朕夢少君將捨朕去矣明日少君臨病困武帝自往視并使左右人受其方書未竟而少君絶武帝流涕曰少君不死也故作此而去既斂之忽失其所在中表衣帶不解如蟬蛻也於是為殯其衣物百餘日行人有見少君在河東蒲坂市者乗青騾帝聞之使發其棺棺中無所復有釘亦不脫唯餘履在耳武帝殊益懊恨求少君之不勤也明年栢梁臺火燒失諸祕書妙文也初少君與議郎董仲相親見仲宿有固疾體枯氣少乃與其成藥二劑并其方一篇用戊己之草后土脂精艮獸沉肪先莠之根百卉華體龍銜之草亥月上旬合煎銅鼎童男童女服盡一劑身體便輕服盡三劑齒落更生服盡五劑命不復傾仲為人剛直博學五經然不逹道術常笑人服藥學道數上書諌武帝以為人生有命衰老有常非道術所能延益雖見其有異以為天性非術所致得其藥竟不服又不解從問其方為藏去之而已少君去後數月仲病甚矣又武帝數道其夢恨惜之仲乃憶所得少君藥試取服之未半能行身體輕壯所苦了愈藥盡氣力如三十時乃更信世間有不死之道即以去官行求道士問以方意悉不能曉然白髪皆還黑形容甚盛後八十餘乃死臨死謂子道生曰我得少君神方我不信事懐恨黄泉汝後可行求術人問解之者若長服此藥必度世也道生感父遺言遂不肯仕周旋天下求解此方到江夏遇博澤先生先生曰此乃非神丹金玉也可使人得數百年而已耳乃具為說解其方意所用物真名道生合藥服之得壽三百七十嵗入雞頭山中不知竟得道不同時卓元成張子仁吳士耳蔡子盛魏仲明張元逹服之或得三百嵗或得五百嵗皆至死不病不傴靣不皺理齒不落髪不白房屋不廢此葢少君凡弊方耳猶使人如此况其上方邪少君當去時宻以六甲左右霛飛術十二事傳東郭延以神丹飛𤣥之方授少君鄉里人蒯子順者此二人後學道並得仙少君又授子訓崑崙神州貞形也王真王真字叔堅上黨人也少為羣吏年七十乃好道尋見仙經雜言說郊間人者周宣王時郊間採薪之人也採薪而行歌曰巾金巾入天門呼長精噏𤣥泉鳴天鼓養泥丸時人莫能知唯柱下史曰此是活國中人其語祕矣其人乃古之漁父也何以知之八百嵗人目瞳正方千嵗人目理縱採薪者乃千嵗之人也貞讀此書而不解其㫖逐搜問諸所在道士經年而遇有解其㫖者語貞曰此近淺之術也為可駐年反白而已耳乃語訣云巾金巾者恒存肺炁入泥丸中徐徐以繞身身常光澤噏𤣥泉者潄其口液而服之使人不老行之七日有効鳴天鼓者朝起常叩齒三十六下使身神安又夜恒存赤氣從天門入周身内外在腦中變為火以燔身身與火同光如此存之亦名曰錬形泥丸腦也天門口也習閉炁而吞之名曰胎息習漱舌下泉而嚥之名曰胎食行之勿休真受訣施行胎息胎食錬形之方甚有驗斷榖二百餘年肉色光美徐行及馬力兼數人自歎曰我行此術唯可不死豈及神丹金玉之方邪乃師事蒯子訓子訓授其肘後方也魏武帝聞之呼與相見見佀年可三十許意嫌其虚詐定校其鄉里皆異口同辭多有少小見真者乃信其有道甚敬重之郄孟節師事真十數年真以蒸丹小餌法授孟節得度世鄉里計真已四百嵗後一日將三少妾登女几山語弟子言合丹去去遂不復還真日行三百里孟節能合棗核以不食至十年又能閉炁不息身不動揺若死人可至百日半嵗亦有家室此法是真所習郊間人之法也孟節為人質謹不妄言魏武帝為立茅舍使令諸方士晉惠懐之際人故有見孟節在長安市中者魏武帝時亦善招求方術道士皆虚心待之但諸得道者莫肯告之以要言耳陳長陳長者在苧嶼山六百年每四時設祭亦不飲食亦無所修人有病者與祭水飲之皆愈也劉綱劉綱者上虞縣令也與妻樊夫人俱得道術二人俱坐林上綱作火燒屋從東邉起夫人作雨從西邉上火滅樊夫人樊夫人樊夫人者劉綱之妻也綱字伯鸞仕為上虞令亦有道術能檄召鬼神禁制變化之道亦潛修宻證人莫能知為理尚清淨簡易而政令宣行民受其惠無旱暵漂墊之害無疫毒鷙暴之傷嵗嵗大豐逺近所仰暇日與夫人較其術用俱坐堂上綱作火燒客碓從東而起夫人禁之火即便滅庭中兩株桃夫妻各呪一株使之相鬭擊良乆綱所呪者不勝數走出於籬外綱唾盤中即成鯽魚夫人唾盤中成獺食其魚綱與夫人入四明山路值虎以靣向地不敢仰視夫人以繩縳虎牽歸繫於床脚下綱每共試術事事不勝將昇天縣㕔側先有大皂莢樹綱昇樹數丈力能飛舉夫人即平坐床上冉冉如雲炁之舉同昇天而去矣東陵聖母東陵聖母者廣陵海陵人也適杜氏師事劉綱學道能易形變化𨼆顯無方杜不信道常恚怒之聖母或行理疾救人或有所之詣杜恚之愈甚告官訟之云聖母姦妖不理家務官收聖母付獄頃之已從獄忩中飛去衆望見之轉高入雲中留所著履一緉在忩下自此昇天逺近立廟祠之民所奉事禱祈立効常有一青鳥在祭所人有失物者乞問所在青鳥即集盜物人之上路不拾遺嵗月稍乆亦不復爾至今海陵海中不得為姦盜之事大者即風波沒溺虎狼殺之小者即病傷也孔元孔元者常服松脂茯苓松實年更少壯已一百七十餘嵗人或飲酒請元作酒令元乃以杖拄地倒立頭向下持酒倒飲人不能為之也乃於水邉鑿岸作一穴方丈餘止其間斷榖或一月兩月而出後入西華嶽得道也王烈王烈王烈字長休邯鄲人常服黄精并錬鉛年二百三十八嵗有少容登山如飛少為書生嵇叔夜與之㳺烈嘗入太行山聞山裂聲往視之山斷數百丈有青泥出如髓取摶之須臾成石如熱臘之狀食之味如粳米仙經云神仙五百嵗輒一開其中有髓得服之者舉天地齊畢涉正涉正涉正字𤣥真巴東人說秦王時事如目前常閉目行亦不開弟子數十年莫見其開目者有一弟子固請開之正乃為開目有聲如霹光如電弟子皆匐地李八百呼為四百嵗小兒也焦先焦先字孝然河東人也漢末關中亂先失家屬獨竄於河渚間食草飲水無衣履時太陽長朱南望見之謂之亡士欲遣船捕取同郡侯武陽語縣此狂癡人耳遂註其籍給廪日五升人皆輕易之然其行不踐邪逕必循阡陌及其搶拾不取大穂飢不茍食寒不茍衣每出見婦人則𨼆翳須至乃出自作一𤓰牛廬淨掃其中營木為床而草褥其上至天寒時搆火以自炙呻吟獨語太和青龍中嘗持一杖南渡河水泛漲輙獨云未可也由是人頗疑不狂所言多騐僉謂之𨼆者也年八十九終孫登孫登孫登字公和汲郡人無家屬於郡北山為土宂居之好讀易撫一絃琴性無恚怒人或投諸水中欲觀其怒登既出便大笑嘗住宜陽山有作炭人見之知非常人與語登不應文帝聞之使阮籍往觀既見與語亦不應嵇康從之逰三年問其所圖終不答康將别謂曰先生竟無言乎登乃曰子識火乎生而有光而不用其光果在於用光人生而有才而不用其才果在於用才故用光在乎得薪所以保其體用才在乎識貞所以全其生今子才多識寡難乎免於今之世矣子無求乎康不能用後作幽憤詩曰昔慚栁下今愧孫登竟莫知其所終神仙傳卷六
