body:
  text: 沈羲沈羲者呉郡人也學道於蜀中但能消灾治病救濟百姓而不知服食藥物功徳感於天天神識之羲與妻賈氏共載詣子婦卓孔寧家道次忽逢白鹿車一乗青龍車一乗白虎車一乗從數十騎皆是朱衣仗節方飾帶劍輝赫滿道問羲曰君見沈道士乎羲愕然曰不知何人耶又曰沈羲答曰是某也何為問之騎吏曰羲有功於民心不忘道從少已來履行無過夀命不長算祿將盡黄老愍之今遣仙官來下迎之侍郎薄延者白鹿車是也度世君司馬生者青龍車是也送迎使者徐福者白虎車是也須臾忽有三仙人在前羽衣持節以白玉版青玉介丹玉字授與羲羲跪受未能讀云拜羲為碧落侍郎主呉越生死之籍遂載羲昇天時道間鋤耘人皆共見之不知何等須臾大霧霧解失其所在但見羲所乗車牛入田食苗或有識是羲牛者以語其家弟子數百人恐是邪魅將羲藏於山谷間乃分布於百里之内求之不得而後四百餘年忽來還鄉推求得其數世孫名懷喜懷喜吿曰聞先人相傳説家祖有仙人今仙人果歸也留數十日羲因話初上天時不得見天尊但見老君東向坐有左右勑羲不得謝但黙坐而已見宫殿鬱鬱有如雲氣五色𤣥黄不可名字侍者數百人多女子及少男庭中有珠玉之𣗳蒙茸叢生龍虎辟邪逰戱其間但聞琅琅有如銅鐵之聲不知何物四壁熠熠有符書著之老君形體略髙一丈披髮垂衣頂項有光須臾數髪有玉女持金盤玉盃盛藥賜羲曰此是神丹服之者不死矣妻各得一刀圭告言飲畢而謝之服藥後賜棗二枚大如雞子脯五寸遣羲去曰汝還人間救治百姓之疾病者君欲來上天書此符懸於竿杪吾當迎汝乃以一符及仙方一首賜羲羲奄忽如睡已在地上後人多得其方術者也陳安世陳安世者京兆人也為灌叔平客稟性慈仁行見鳥獸下道避之不欲驚動不踐生蟲未嘗殺物年三十而叔平好道思神忽有二仙人託為書生從叔平行遊以觀試之叔平不覺其是仙人也久而轉懈怠叔平在内方作美食二仙人復來詣門問安世曰叔平在否答曰在因入白叔平叔平即欲出其妻止之曰餓書生輩復欲求腹飽耳勿與食於是叔平使安世出吿言不在二人曰汝向言在今言不在何也大家勑我去耳二人益善之以實對乃相謂曰叔平勤苦有年今日值吾二人而反懈怠是其不遇我幾成而敗之乃問安世曰汝好遨戯耶答曰不好也又曰汝好道希仙耶答曰好道然無緣知耳二人曰汝審好道明日早㑹道北大𣗳下安世早徃期處到日西而不見二人乃起將去曰書生定欺我耳二人已在其耳邉呼之曰安世汝來何晚耶答曰早旦來但不見君耳二人曰我端坐在汝邉耳頻三期之而安世輒早至知其可教乃以藥兩丸與之誡曰汝歸家勿復飲食别止一處安世依誡二人常徃其處叔平怪之曰安世處空室何得有人語徃輒不見何也答曰我獨語耳叔平見安世不服食但飲水止息别位疑非常人自知失賢乃歎曰夫道尊徳貴不在年齒父母生我然非師則莫能使我長生也先聞道者則為師矣乃自執弟子之禮朝夕拜事安世為之洒掃安世道成白日昇天臨去遂以要道傳叔平叔平後亦得仙也李八伯李八伯者蜀人也莫知其名歴世見之時人計之已年八百嵗因以號之或𨼆山林或在市知漢中唐公昉求道而不遇明師欲教以至道乃先徃試之為作傭客公昉不知也八伯驅使用意過於他人公昉甚愛待之後八伯乃偽作病危困欲死公昉為迎醫合藥費數十萬不以為損憂念之意形於顔色八伯又轉作惡瘡周身匝體膿血臭惡不可近視人皆不忍近之公昉為之流涕曰卿為吾家勤苦累年而得篤病吾趣欲令卿得愈無所恡惜而猶不愈當如卿何八伯曰吾瘡可愈然須得人䑛之公昉乃使三婢為䑛之八伯曰婢䑛之不能使愈若得君䑛之乃當愈耳公昉即為䑛之八伯又言君䑛之復不能使吾愈得君婦為䑛之當愈也公昉乃使婦䑛之八伯曰瘡乃欲差然須得三十斛美酒以浴之乃都愈耳公昉即為具酒三十斛著大器中八伯乃起入酒中洗浴瘡則盡愈體如凝脂亦無餘痕乃吿公昉曰吾是仙人君有至心故來相試子定可教今當相授度世之訣矣乃使公昉夫妻及䑛瘡三婢以浴餘酒自洗即皆更少顔色恱美以丹經一卷授公昉公昉入雲臺山中合丹丹成便登仙去今拔宅之處在漢中也李阿李阿者蜀人也蜀人傳世見之不老如故常乞於成都市而所得隨復以拯貧窮者夜去朝還市人莫知其所宿也或問徃事阿無所言但占阿顔色若顔色欣然則事皆吉若容貌慘戚則事皆㓙若阿含笑者則有大慶微歎者則有深憂如此之候未曽不審也有古强者疑阿是異人常親事之試隨阿還所宿乃在青城山中强後復欲隨阿去然身未知道恐有虎狼故持其父長刀以自衞阿見之怒曰汝隨我行何畏虎耶取强刀擊石折敗强憂刀敗至旦復出隨之阿問曰汝愁刀敗耶强言實恐父怒阿即取刀以左右手擊地刀復如故以還强强逐阿還成都未至道次逢奔車阿以脚置車下轢其脚脛皆折阿即死强驚視之須臾阿起以手抑按脚復如故强年十八見阿色如五十許人至强年八十餘而阿猶如故後語人云被崑崙山召當去遂不復還耳王逺王逺字方平東海人也舉孝亷除郎中稍加至中散大夫博學五經尤明天文圖䜟河洛之要逆知天下盛衰之期九州吉㐫觀諸掌握後棄官入山修道道成漢孝桓帝聞之連徵不出使郡牧逼載以詣京師逺低頭閉口不肯答詔乃題宫門扇板四百餘字皆説方來之事帝惡之使人削之外字始去内字復見字墨皆徹入板裏方平無復子孫鄉里人累世相傳共事之同郡故太尉公陳耽為方平架道室旦夕朝拜之但乞福消灾不從學道方平在耽家四十餘年耽家無疾病死喪奴婢皆然六畜繁息田萬倍仕宦髙遷後語耽云吾期運將盡當去不得復停明日日中當發也至時方平死耽知其化去不敢下著地但悲涕歎息曰先生捨我去耶我將何如具棺器燒香就床上衣裝之至三日三夜忽失其尸衣帶不解如蛇蛻耳方平去後百餘日耽亦死或謂耽得方平之道化去或謂方平知耽將終委之而去也其後方平欲東之括蒼山過呉徃胥門蔡經家經者小民也骨相當仙方平知之故住其家遂語經曰汝生命應得度世故欲取汝以補仙官然汝少不知道今氣少肉多不得上昇當為尸解耳尸解一劇須臾如從狗竇中過耳吿以要言乃委經去後經忽身體發熱如火欲得水灌舉家汲水以灌之如沃燋石似此三日中消耗骨立乃入室以被自覆忽然失其所在視其被中惟有皮頭足具如今蟬蜕也去十餘年忽然還家去時已老還更少壯頭髪還黑語其家云七月七日王君當來過到其日可多作數百斛飲食以供從官乃去到期日其家假借盆甕作飲食數百斛羅列覆置庭中其日方平果來未至經家則聞金鼔簫管人馬之聲比近皆驚不知何所在及至經家舉家皆見方平著逺逰冠朱服虎頭鞶裳五色綬帶劍少鬚黄色長短中形人也乗羽車駕五龍龍各異色麾節幡旗前後導從威儀奕奕如大將軍也有十二玉壺皆以臘封其口鼔吹皆乗麟從天上下懸集不從道行也既至從官皆𨼆不知所在惟見方平坐耳須臾引見經父母兄弟因遣人召麻姑相問亦莫知麻姑是何神也言王方平敬報久不在民間今集在此想姑能暫來語否有頃信還但聞其語不見所使人也答言麻姑再拜比不相見忽已五百餘年尊卑有序脩敬無階思念煩信承來在彼登當傾倒而先被記當案行蓬萊今便暫徃如是當還還便親覲願未即去如此兩時間麻姑來來時亦先聞人馬之聲既至從官當半於方平也麻姑至蔡經亦舉家見之是好女子年十八九許於頂中作髻餘髮散垂至腰其衣有文章而非錦綺光彩耀日不可名字皆世所無有也入拜方平方平為之起立坐定召進行厨皆金玉盃盤無限也餚膳多是諸花菓而香氣達於内外擘脯而行之如松栢炙云是麟脯也麻姑自說接待以來已見東海三為桑田向到蓬萊水又淺於徃昔㑹時略半也豈將復還為陵陸乎方平笑曰聖人皆言海中行復揚塵也麻姑欲見蔡經母及婦姪時經弟婦新産數十日麻姑望見乃知之曰噫且止勿前即求少許米至得米便以撒地謂以米祛其也視米皆成真珠方平笑曰姑故少年也吾老矣不喜復作此曹輩狡獪變化也方平語經家人曰吾欲賜汝輩酒此酒乃出天厨其味醇釀非俗人所宜飲飲之或能爛腸今當以水和之汝輩勿怪也乃以一升酒合水一斗攪之以賜經家人人飲一升許皆醉良久酒盡方平語左右曰不足復還取也以千錢與餘杭姥相聞求其酤酒須臾信還得一油囊酒五斗許信傳餘杭姥答言恐地上酒不中尊者飲耳又麻姑手爪不如人爪形皆似鳥爪蔡經中心私言若背大癢時得此爪以爬背當佳也方平已知經心中所言即使人牽經鞭之曰麻姑神人也汝何忽謂其爪可以爬背耶便見鞭著經背亦不見有人持鞭者方平吿經曰吾鞭不可妄得也經比有姓陳失其名字嘗罷尉聞經家有神人乃詣門扣頭求乞拜見於是方平引前與語此人便乞得驅使比於蔡經方平曰君且起可向日立方平從後視之曰噫君心不正影不端終不可教以仙道也當授君地上主者之職臨去以一符并一傳著小箱中以與陳尉吿言此不能令君度世止能令君竟本夀夀自出百嵗也可以消灾治病病者命未終及無罪犯者以符到其家便愈矣若有邪鬼血食作禍者帶此傳以勑社吏當收送其鬼君心中亦當知其輕重臨時以意治之陳尉以此符治病有效事之者數百家陳尉夀一百一十一嵗而死死後其子孫行其符不復效矣方平去後經家所作飲食數百斛在庭中者悉盡亦不見人飲食之也經父母私問經曰王君是何神人復居何處經答曰常治崑崙山徃來羅浮山括蒼山此三山上皆有宫殿宫殿一如王宫王君常任天曹事一日之中與天上相反覆者數遍地上五嶽生死之事悉闗王君王君出時或不盡將百官惟乗一黄麟將士數十人侍每行常見山林在下去地常數百丈所到山海之神皆來奉迎拜謁或有千道者後數年經復暫歸家方平有書與陳尉真書廓落大而不工先是無人知方平名逺者起此乃因陳尉書知之其家於今世世存錄王君手書及其符傳於小箱中秘之也伯山甫伯山甫者雍州人也在華山中精思服餌時時歸鄉里省親如此二百餘年不老每入人家即知人家先世已來善惡功過有如臨見又知未來吉㓙言無不效見其外生女年老多病將藥與之女服藥時年七十稍稍還少色如桃花漢遣使者經見西河城東有一女子笞一老翁其老翁頭髮皓白長跪而受杖使者怪而問之女子曰此是妾兒昔妾舅氏伯山甫以神方教妾妾教使服之不肯而致今日衰老不及於妾妾恚怒故與之杖耳使者問女及兒今各年幾女子答云妾年二百三十嵗矣兒今年七十此女後入華山得仙而去神仙傳卷三
