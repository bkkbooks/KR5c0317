body:
  text: 神仙傳陶隱居遇神仙桓聞曰君之陰功著矣然所修本草用蝱蟲水蛭輩為藥功雖及人而害物命以此一紀後方得解形而去王次仲變篆為隸始皇召之不至將殺之次仲化為大鳥振翼而起使者拜曰無以復命恐見誅乃以三大翮墮與使者始皇因名其山曰落翮山劉政有道術能以一人作千人千人作萬人又能噓水興雲聚壤成山刺地成淵
