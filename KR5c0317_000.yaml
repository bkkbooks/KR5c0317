front:
  text: 滕升問仙人有無而作所録凡八十四人序稱秦大夫阮倉所記凡數百人劉向所撰又七十一人今復抄集古之仙者見于仙經服食方百家之書先師所說耆儒所論以為十卷又稱劉向所述殊甚簡略而自謂此傳有愈于向今考其書惟容成公彭祖二條與列仙傳重出餘皆𥙷向所未載其中如黃帝之見廣成子盧敖之遇若士皆莊周之寓言不過鴻濛雲將之類未嘗實有其人淮南王劉安謀反自殺李少君病死具載史記漢書亦實無登仙之事洪一槩登載未免附㑹至謂許由巢父服箕山石流黃丹今在中嶽中山若二人晉時尚存洪目睹而記之者尤為虛誕然後漢書方術傳載壺公薊子訓劉根左慈甘始封君達諸人已多與此書相符疑其亦據舊文不盡僞撰又流傳既久遂為故實厯代詞人轉相沿用不必一一核其真僞也諸家著録皆作十卷與今本合惟隋書經籍志稱為葛洪列仙傳其名獨異考新舊唐書並作葛洪神仙傳知今本隋志殆承上列仙傳讚之文偶然誤刋非書有二名也此本為毛晉所刋考裴松之蜀志先主傳注引李意期一條吳志士燮傳注引董奉一條吳範劉惇趙達傳注引介象一條併稱葛洪所述近為惑衆其書文頗行世故撮舉數事載之篇末是徴引此書以三國志注為最古然悉與此本相合知為原帙漢魏叢書别載一本其文大略相同而所載凡九十二人核其篇第蓋從太平廣記所引鈔合而成廣記標題間有舛誤亦有與他書見即不引神仙傳者故其本頗有訛漏即如盧敖若士一條李善注文選江淹别賦鮑照升天行凡兩引之俱稱葛洪神仙傳與此本合因太平廣記未引此條漢魏叢書本遂不載之足以證其非完本矣乾隆四十一年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書子部十四神仙傳目録道家類神仙傳原序洪著內篇論神仙之事凡二十卷弟子滕升問曰先生曰神仙可得不死可學古之得仙者豈有其人乎答曰昔秦大夫阮倉所記有數百人劉向所撰又七十一人蓋神仙幽𨼆與世異流世之所聞者猶千不及一者也故寧子入火而凌煙馬皇見迎以獲龍方回咀嚼以雲母赤將茹葩以隨風㳙子餌术以著經嘯父烈火以無窮務光游淵以脯薤仇生却老以食松卭疏服石以鍊形琴髙乘鯉於碭中桂父改色以龜腦女丸七十以增容陵陽吞五脂以登髙商丘咀菖蒲以不終雨師煉五色以厲天子光轡虬雷於𤣥塗周晉跨素禽於緱氏軒轅控飛龍於鼎湖葛由䇿木羊於綏山陸通匝遐紀於黃盧蕭史乘鳯而輕舉東方飄衣於京都犢子靈化以淪神主柱飛行於丹砂阮丘長存於睢嶺英氏乘魚以登遐修羊陷石於西嶽馬丹回風以電徂鹿翁陟險而流泉園客蟬蛻於五華余今復抄集古之仙者見於仙經服食方及百家之書先師所說耆儒所論以為十卷以傳知真識逺之士其繫俗之徒思不經微者亦不强以示之矣則知劉向所述殊甚簡要美事不舉此傳雖深妙竒異不可盡載猶存大體謂有愈於向多所遺棄也葛洪撰
