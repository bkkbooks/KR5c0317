body:
  text: 提要臣等謹按神仙傳十卷晉葛洪撰是書據洪自序蓋于抱撲子內篇既成之後因其弟子滕升問仙人有無而作所録凡八十四人序卷一廣成子若士沈文泰彭祖白石生黃山君鳯綱卷二皇初平吕恭沈建華子期樂子長衛叔卿魏伯陽卷三沈羲陳安世李八伯李阿王逺伯山甫卷四墨子劉政孫博班孟玉子天門子九靈子北極子絶洞子太陽子太陽女太隂女太𤣥女南極子黃盧子卷五馬鳴生隂長生茅君張道陵欒巴卷六淮南王李少君王真陳長劉綱樊夫人東陵聖母孔元王烈涉正焦先孫登卷七東郭延靈壽光劉京嚴青帛和趙瞿宫嵩容成公董仲君倩平吉王仲都程偉妻薊子訓卷八葛𤣥左慈王遙陳永伯太山老父巫炎河上公劉根卷九壺公尹軌介象卷十董奉李根李意期王興黃敬魯女生甘始封君達
