body:
  text: 廣成子廣成子者古之仙人也居崆洞山石室之中黃帝聞而造焉曰敢問至道之要廣成子曰爾治天下雲不待簇而飛草木不待黃而落奚足以語至道哉黃帝退而間居三月復往見之廣成子方北首而卧黃帝膝行而前再拜請問治身之道廣成子蹶然而起曰至哉子之問也至道之精窈窈冥冥至道之極昏昏默默無視無聽抱神以靜形將自正必靜必清無勞爾形無搖爾精乃可長生慎內閉外多知為敗我守其一以處其和故千二百歲而形未嘗衰得吾道者上為皇入吾道者下為王吾將去汝適無何之鄉入無窮之門逰無極之野與日月齊光與天地為常人其盡死而我獨存焉若士若士者古之神仙也莫知其姓名燕人盧敖秦時逰于北海經于太隂入于玄關至于蒙谷之山而見若士焉其為人也深目而玄凖鳶肩而修頸豐上而殺下欣欣然方迎風軒輊而舞顧見盧敖因遁逃于碑下盧敖仰而視之方踡龜殼而食蟹蛤盧敖乃與之語曰惟以敖為背羣離黨窮觀六合之外幼而好逰長而不渝周行四極推此隂之未闕今卒覩夫子于此殆可與敖為友乎若士儼然而笑曰嘻子中州之民不宜逺而至此猶光乎日月而載乎列星比夫不名之地猶突奧也我昔南逰乎洞濔之野北息乎沈默之鄉西窮乎窈冥之室東貫乎澒洞之光其下無地其上無天視焉無見聽焉無聞其外猶有沷沷之汜其行一舉而千萬里吾猶未之能也今子逰始至於此乃云窮觀豈不陋哉然子處矣吾與汗漫期於九垓之上不可以久住乃舉臂竦身遂入雲中盧敖仰而視之弗見乃止愴恨若有喪者也曰吾比夫子也猶鴻鵠之與壤蟲也終日而行不離咫尺自以為逺不亦謬也悲哉沈文泰沈文泰者九疑人也得江衆神丹土符還年之道服之有效欲於崑崙安息二千餘年以傳李文淵曰土符不法服藥行道無益也文淵遂授其祕要後亦升天今以竹根汁煮丹黃土去三尸出此二人也彭祖彭祖者姓籛名鏗帝顓頊之玄孫至殷末世年七百六十歲而不衰老少好恬靜不恤世務不營名譽不飾車服唯以養生治身為事殷王聞之拜為大夫常稱疾間居不與政事善於補養導引之術并服水桂雲母粉麋鹿角常有少容然其性沈重終不自言有道亦不作詭惑變化鬼怪之事窈然無為時乃逰行人莫知其所詣伺候之竟不見也有車馬而不常乘或數百日或數十日不持資糧還家則衣食與人無異常閉氣內息從平旦至日中乃危坐拭目摩搦身體舐唇咽唾服氣數十乃起行言笑如故其體中或有疲倦不安便導引閉氣以攻其患心存其身頭面九竅五藏四肢至于毛髮皆令其存覺其氣行體中起於鼻口中達十指末尋即平和也王自詣問訊不告之致遺珍玩前後數萬彭祖皆受之以恤貧賤略無所留又有采女者亦少得道知養形之方年二百七十歲視之年如十五六王奉事之於掖庭為立華屋紫閣飾以金玉乃令采女乘輕軿而往問道於彭祖采女再拜請問延年益夀之法彭祖曰欲舉形登天上補仙官者當用金丹此元君太一所服白日升天也然此道至大非君王所為其次當愛精養神服餌至藥可以長生但不能役使鬼神乘虛飛行耳不知交接之道雖服藥無益也采女能養隂陽者也隂陽之意可推而得但不思之耳何足枉問耶僕遺腹而生三歲失母遇犬戎之亂流離西域百有餘年加以少怙喪四十九妻失五十四子數遭憂患和氣折傷令肌膚不澤榮衛焦枯恐不得度世所聞素又淺薄不足宣傳今大宛山中有青精先生者傳言千歲色如童子行步一日三百里能終歲不食亦能一日九餐真可問也采女曰敢問青精先生所謂何仙人也彭祖曰得道者耳非仙人也仙人者或竦身入雲無翅而飛或駕龍乘雲上造太階或化為鳥獸浮逰青雲或潛行江海翺翔名山或食元氣或茹芝草或出入人間則不可識或隱其身草野之間面生異骨體有竒毛戀好深僻不交流俗然有此等雖有不亡之夀皆去人情離榮樂有若雀之化蛤雉之為蜃失其本真更守異器今之愚心未之願也人道當食甘旨服輕麗通隂陽處官秩耳目聰明骨節堅強顔色和澤老而不衰延年久視長在世間寒溫風濕不能傷鬼神衆精莫敢犯五兵百蟲不能近憂喜毁譽不為纍乃可貴耳人之受氣雖不知方術但養之得宜當至百二十歲不及此者皆傷之也小復曉道可得二百四十歲能加之可至四百八十歲盡其理者可以不死但不成仙人耳養壽之道但莫傷之而已夫冬溫夏涼不失四時之和所以適身也美色淑姿幽間娛樂不致思欲之惑所以通神也車服威儀知足無求所以一其志也八音五色以玩視聽所以導心也凡此皆以養壽而不能斟酌之者反以速患古之至人恐下才之子未識事宜流遁不還故絶其源也故有上士别床中士異被服藥千褁不如獨卧五色令人目盲五味令人口爽茍能節宣其宜適抑揚其通塞者不減年算而得其益凡此之類譬猶水火用之過當反為害耳人不知其經脈損傷血氣不足內理空疏髓腦不實體已先病故為外物所犯因風寒酒色以發之耳若本充實豈當病耶凡逺思強記傷人憂恚悲哀傷人情樂過差傷人忿怒不解傷人汲汲所願傷人戚戚所患傷人寒暖失節傷人隂陽不交傷人所傷人者甚衆而獨責於房室不亦惑哉男女相成猶天地相生也所以導養神氣使人不失其和天地得交接之道故無終竟之限人失交接之道故有殘折之期能避衆傷之事得隂陽之術則不死之道也天地晝離而夜合一嵗三百六十交而精氣和合者有四故能生育萬物不知窮極人能則之可以長存次有服氣得其道則邪氣不得入治身之本要也其餘吐納導引之術及念體中萬神有含影守形之事一千七百餘條及四時首向責已謝過卧起早晏之法皆非真道可以教初學者以正其心耳愛精養體服氣鍊形萬神自守其不然者則榮衛枯瘁萬神自逝非思念所留者也愚人為道不務其本而逐其末告以至言又不能信見約要之書謂之輕淺而晝夕伏誦觀夫太清北神中經之屬以此疲勞至死無益也不亦悲哉又人苦多事又少能棄世獨住山居穴處者以順道教之終不能行是非仁人之意也但知房中之道閉氣之術節思慮適飲食則得道矣吾先師初著九都節解韜形隱遁無為開明四極九室諸經萬三千首為以示始涉門庭者耳采女具受諸要以教王王試為之有驗欲祕之乃令國中有傳彭祖道者誅之又欲害彭祖以絶之彭祖知之乃去不知所在其後七十餘年聞人於流沙之西見之王能常行彭祖之道得壽三百嵗力轉丁壯如五十時鄭女妖淫王失其道而殂俗間相傳言彭祖之道殺人者由於王禁之故也彭祖去殷時年七百七十嵗非壽終也白石生白石生者中黃丈人弟子也至彭祖之時已年二千餘嵗矣不肯修升仙之道但取於不死而已不失人間之樂其所據行者正以交接之道為主而金液之藥為上也初患家貧身賤不能得藥乃養豬牧羊十數年約衣節用致貨萬金乃買藥服之常煮白石為糧因就白石山居時人號曰白石生亦時食脯飲酒亦時食穀日能行三四百里視之色如三十許人性好朝拜存神又好讀仙經及太素傳彭祖問之何以不服藥升天乎答曰天上無復能樂於此間耶但莫能使老死耳天上多有至尊相奉事更苦人間耳故時人號白石生為隱遁仙人以其不汲汲於升天為仙官而不求聞達故也黃山君黃山君者修彭祖之術年數百嵗猶有少容亦治地仙不取飛升彭祖既去乃追論其言為彭祖經得彭祖經者便為木中之松柏也鳯綱鳯綱者漁陽人也常採百草花以水漬泥封之自正月始盡九月末止埋之百日煎丸之卒死者以此藥內口中皆立生綱長服此藥得夀數百嵗不老後入地肺山中仙去神仙傳卷一
